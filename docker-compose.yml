services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lugus_library
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
  app:
    build: .
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/lugus_library?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: root
      UPLOAD_DIR: /usr/local/tomcat/uploads
    volumes:
      - uploads_data:/usr/local/tomcat/uploads
volumes:
  mysql_data:
  uploads_data:
